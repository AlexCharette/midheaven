# Lean checks on the root crate + the webview frontend. The desktop Rust
# crate is exercised by the release workflow (it needs platform webview
# toolchains that aren't worth installing here).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: ~/.cache/astro-geonames
          key: geonames-${{ hashFiles('build.rs') }}
      - run: cargo test -p astro
      - run: cargo clippy -p astro --all-targets -- -D warnings
      # The webview's TypeScript contract types are generated from the Rust
      # structs by ts-rs. Regenerate and fail if the committed bindings drift —
      # so a contract rename can't silently diverge from the frontend. (The
      # desktop DTOs are generated from the desktop crate, which CI doesn't
      # build; `npm run gen:types` locally + the svelte `check` job cover those.)
      - name: contract bindings are up to date
        run: |
          TS_RS_EXPORT_DIR="$PWD/desktop/src/lib" cargo test -p astro --features ts export_bindings
          git diff --exit-code desktop/src/lib/generated

  svelte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run check
        working-directory: desktop
